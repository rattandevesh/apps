replicaCount: 3

image:
  tag: "1.0.0"
  imageDigest: "sha256:abc123"

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20

podDisruptionBudget:
  enabled: true
  minAvailable: 2

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: catalog.prod.example.internal
      paths:
        - path: /catalog
          pathType: Prefix
