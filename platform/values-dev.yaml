# Development environment values
namespace: platform-dev

redis:
  enabled: true
  resources:
    requests:
      memory: "128Mi"
      cpu: "50m"
    limits:
      memory: "256Mi"
      cpu: "200m"

postgresql:
  enabled: true
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

monitoring:
  enabled: true
  prometheus:
    retention: 7d

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
