namespace: platform

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
  persistence:
    enabled: true
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

postgresql:
  enabled: true
  auth:
    postgresPassword: changeme
  primary:
    persistence:
      enabled: true
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

ingressClass:
  enabled: true
  name: nginx

clusterIssuers:
  enabled: false
  email: admin@example.com
  region: us-east-1

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
