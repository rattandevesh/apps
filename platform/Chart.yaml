apiVersion: v2
name: platform
description: Platform chart for shared infrastructure (Redis, Postgres, issuers, RBAC)
type: application
version: 1.0.0
appVersion: "1.0.0"
dependencies:
  - name: redis
    version: "18.19.1"
    repository: https://charts.bitnami.com/bitnami
    condition: redis.enabled
  - name: postgresql
    version: "14.3.3"
    repository: https://charts.bitnami.com/bitnami
    condition: postgresql.enabled
