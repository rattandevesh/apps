# Staging environment values
namespace: platform-stage

redis:
  enabled: true
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

postgresql:
  enabled: true
  resources:
    requests:
      memory: "512Mi"
      cpu: "250m"
    limits:
      memory: "1Gi"
      cpu: "1000m"

monitoring:
  enabled: true
  prometheus:
    retention: 15d

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
