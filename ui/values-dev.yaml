replicaCount: 1

image:
  tag: "1.0.0"

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "256Mi"
    cpu: "200m"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5

ingress:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
  hosts:
    - host: ui.dev.example.internal
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ui-tls-dev
      hosts:
        - ui.dev.example.internal
