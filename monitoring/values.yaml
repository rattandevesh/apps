# Prometheus Operator
prometheus:
  enabled: true
  prometheusSpec:
    retention: 15d
    resources:
      requests:
        memory: "512Mi"
        cpu: "250m"
      limits:
        memory: "1Gi"
        cpu: "1000m"
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp2
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 50Gi

# Grafana
grafana:
  enabled: true
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"
  adminPassword: prom-operator
  dashboards:
    default:
      retail-store-overview:
        gnetId: 0
        revision: 1
        datasource: Prometheus
      api-latency:
        gnetId: 0
        revision: 1
        datasource: Prometheus
      error-rate:
        gnetId: 0
        revision: 1
        datasource: Prometheus
      hpa-scaling:
        gnetId: 0
        revision: 1
        datasource: Prometheus

# Alertmanager
alertmanager:
  enabled: true
  config:
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname', 'cluster', 'service']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 12h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
    receivers:
      - name: 'default'
        slack_configs:
          - send_resolved: true
            api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'
      - name: 'critical'
        slack_configs:
          - send_resolved: true
            api_url: 'https://hooks.slack.com/services/YOUR/WEBHOOK/URL'

# Default Service Monitors
defaultRules:
  create: true
  rules:
    alertmanager: true
    etcd: true
    configReloaders: true
    general.rules: true
    k8s: true
    kubeApiserver: true
    kubeApiserverAvailability: true
    kubeApiserverBurnrate: true
    kubeApiserverSlos: true
    kubeControllerManager: true
    kubelet: true
    kubeProxy: true
    kubePrometheusGeneral: true
    kubePrometheusNodeRecording: true
    kubernetesResources: true
    kubernetesStorage: true
    kubeStateMetrics: true
    network: true
    node: true
    nodeExporterAlerting: true
    nodeExporterRecording: true
    prometheus: true
    prometheusOperator: true
